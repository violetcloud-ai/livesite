<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>violetcloud.ai - Under Construction</title>
    <style>
        body {
            background-color: #fff8c8; /* Exact pale cream background from image */
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', Gadget, sans-serif;
        }
        .container {
            text-align: center;
        }
        svg {
            width: 180px;
            height: 180px;
            margin-bottom: 25px;
        }
        h1 {
            color: #333333;
            font-size: 18px;
            letter-spacing: 2px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Crossed wrench and screwdriver SVG -->
        <svg viewBox="0 0 200 200">
            
            <!-- SCREWDRIVER (Angled from bottom-left to top-right) -->
            <g transform="translate(100,100) rotate(45) translate(-100,-100)">
                <!-- Handle Base Shadow/Darker side -->
                <rect x="91" y="110" width="18" height="60" rx="6" fill="#D35400" />
                <!-- Handle Main Body (Orange) -->
                <rect x="91" y="110" width="14" height="60" rx="6" fill="#E67E22" />
                <!-- Handle Center Highlight Strip -->
                <rect x="95" y="115" width="4" height="50" rx="2" fill="#F39C12" />
                
                <!-- Metal Shaft -->
                <rect x="95" y="45" width="10" height="65" fill="#BDC3C7" />
                
                <!-- Flathead Tip -->
                <polygon points="92,45 108,45 105,33 95,33" fill="#95A5A6" />
            </g>

            <!-- WRENCH (Angled from top-left to bottom-right) -->
            <g transform="translate(100,100) rotate(-45) translate(-100,-100)">
                <!-- Main Handle Shaft (Extended to y=155 so it is flush with screwdriver handle base) -->
                <rect x="94" y="55" width="12" height="100" fill="#7F8C8D" />
                
                <!-- Closed Ring End (Slightly smaller outer circle, moved down to match extension) -->
                <circle cx="100" cy="155" r="14" fill="#7F8C8D" />
                
                <!-- Hexagon Box-End Cutout (Cuts out to match background color) -->
                <polygon points="100,148 106,151.5 106,158.5 100,162 94,158.5 94,151.5" fill="#fff8c8" />
                
                <!-- Open Wrench Head (Top) -->
                <circle cx="100" cy="55" r="18" fill="#7F8C8D" />
                
                <!-- Hex Jaw Cutout (Aligned with diagonal handle trajectory) -->
                <!-- Rectangular throat cutout -->
                <rect x="91" y="32" width="18" height="22" fill="#fff8c8" />
                <!-- Hex corner cutout at the back of throat -->
                <polygon points="91,54 100,60 109,54" fill="#fff8c8" />
            </g>
            
        </svg>
        
        <h1>NEW WEBSITE UNDER CONSTRUCTION</h1>
    </div>

</body>
</html>
